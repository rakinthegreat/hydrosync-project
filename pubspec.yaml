name: hydrosync
description: A gorgeous water tracking and reminder app.
version: 1.0.2+3

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  flutter_local_notifications: ^21.0.0
  google_fonts: ^6.2.1
  wave: ^0.2.1
  lottie: ^3.1.0
  http: ^1.6.0
  geolocator: ^14.0.2
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  google_sign_in: ^7.2.0
  cloud_firestore: ^6.3.0
  home_widget: ^0.9.1
  google_sign_in_all_platforms: ^2.0.2
  window_manager: ^0.5.1
  sensors_plus: ^7.0.0
  timezone: ^0.11.0
  package_info_plus: ^9.0.1
  firebase_analytics: ^12.3.0
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - .env

